name: Code Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened] # When PR is first created, new commits are pushed, PR is reopened

jobs:
  code-review: # Job name
    runs-on: ubuntu-latest #VM

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # clone
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install langchain langgraph anthropic groq python-dotenv

      - name: Run code review               
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python github_action_runner.py
